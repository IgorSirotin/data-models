name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  PACKAGE_VERSION: 0.1.0.${{ github.run_attempt }}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build packages
        run: mvn --batch-mode -Drevision=${{ env.PACKAGE_VERSION }} package

      - name: Upload generated NuGet packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*.nupkg
          if-no-files-found: ignore

  publish:
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build packages for publishing
        run: mvn --batch-mode -Drevision=${{ env.PACKAGE_VERSION }} package

      - name: Publish NuGet packages to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          $packages = Get-ChildItem -Path "artifacts/nuget" -Filter "*.nupkg" -File
          if ($packages.Count -eq 0) {
            throw "No NuGet packages were generated."
          }

          foreach ($package in $packages) {
            dotnet nuget push $package.FullName `
              --api-key $env:GITHUB_TOKEN `
              --source "https://nuget.pkg.github.com/$env:GITHUB_OWNER/index.json" `
              --skip-duplicate
          }